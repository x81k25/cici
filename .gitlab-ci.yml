stages:
  - build

variables:
  IMAGE_PREFIX: "${CI_REGISTRY_IMAGE}"

.build-template: &build-template
  stage: build
  tags:
    - k8s
    - docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  variables:
    KUBERNETES_MEMORY_REQUEST: "256Mi"
    KUBERNETES_MEMORY_LIMIT: "4Gi"
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json

build-mind:
  <<: *build-template
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/mind"
      --dockerfile "${CI_PROJECT_DIR}/mind/Dockerfile"
      --destination "${IMAGE_PREFIX}/mind:latest"
      --insecure

build-ears:
  <<: *build-template
  variables:
    KUBERNETES_MEMORY_REQUEST: "4Gi"
    KUBERNETES_MEMORY_LIMIT: "12Gi"
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/ears"
      --dockerfile "${CI_PROJECT_DIR}/ears/Dockerfile"
      --destination "${IMAGE_PREFIX}/ears:latest"
      --insecure
      --single-snapshot
      --compressed-caching=false

build-mouth:
  <<: *build-template
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/mouth"
      --dockerfile "${CI_PROJECT_DIR}/mouth/Dockerfile"
      --destination "${IMAGE_PREFIX}/mouth:latest"
      --insecure

build-face:
  <<: *build-template
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/face"
      --dockerfile "${CI_PROJECT_DIR}/face/Dockerfile"
      --destination "${IMAGE_PREFIX}/face:latest"
      --insecure

build-android:
  stage: build
  tags:
    - k8s
  image: eclipse-temurin:17-jdk
  variables:
    ANDROID_COMPILE_SDK: "35"
    ANDROID_BUILD_TOOLS: "35.0.0"
    ANDROID_SDK_TOOLS: "14742923"
  before_script:
    - apt-get -qq update && apt-get -qq install -y wget unzip
    - export ANDROID_HOME="/opt/android-sdk"
    - mkdir -p $ANDROID_HOME/cmdline-tools
    - wget -q "https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip" -O /tmp/cmdtools.zip
    - unzip -q /tmp/cmdtools.zip -d $ANDROID_HOME/cmdline-tools
    - mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
    - yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
    - $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}" > /dev/null
    - chmod +x ./face-android/gradlew
  script:
    - cd face-android && ./gradlew assembleDebug
  artifacts:
    paths:
      - face-android/app/build/outputs/apk/debug/app-debug.apk
    expire_in: 30 days
